<!-- ================= HTML ================= -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rangkaian Lampu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💡 Simulasi Rangkaian Lampu</h1>

<!-- RANGKAIAN 1 -->
<section class="card">
  <h2>Rangkaian 1 (3 Lampu)</h2>
  <div class="lamp-container" id="r1">
    <img src="pic_bulboff.gif" class="lamp">
    <img src="pic_bulboff.gif" class="lamp">
    <img src="pic_bulboff.gif" class="lamp">
  </div>
  <div class="btn-group">
    <button onclick="toggleOne('r1')">Button 1 (Satu per Satu)</button>
    <button onclick="toggleAll('r1')">Button 2 (Semua)</button>
  </div>
</section>

<!-- RANGKAIAN 2 -->
<section class="card">
  <h2>Rangkaian 2 (4 Lampu)</h2>
  <div class="lamp-container" id="r2">
    <img src="pic_bulboff.gif" class="lamp">
    <img src="pic_bulboff.gif" class="lamp">
    <img src="pic_bulboff.gif" class="lamp">
    <img src="pic_bulboff.gif" class="lamp">
  </div>
  <div class="btn-group">
    <button onclick="toggleOne('r2')">Button 1 (Satu per Satu)</button>
    <button onclick="toggleAll('r2')">Button 2 (Semua)</button>
    <button onclick="toggleGroup()">Button 3 (A,B & C,D)</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
